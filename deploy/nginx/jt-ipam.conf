# =============================================================================
# jt-ipam — nginx site
#
# 安裝路徑：/etc/nginx/sites-available/jt-ipam
# 啟用：sudo ln -s /etc/nginx/sites-available/jt-ipam /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# OWASP A05：security headers + server_tokens off
# =============================================================================
server_tokens off;

# 限流（A04 / A07）：登入端點較嚴
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=1200r/m;

map $sent_http_content_type $expires {
    default                 off;
    text/html               -1;
    ~image/                 30d;
    ~font/                  30d;
    application/javascript  7d;
    text/css                7d;
}

# Rate limit response 用 429 而非預設 503
limit_req_status 429;

# ─────────────────────────────────────────────────────────────────────────────
# HTTP — redirect to HTTPS（prod 必開）
# ─────────────────────────────────────────────────────────────────────────────
server {
    # default_server：覆蓋 apt install nginx 預設留的 default site
    # 這樣任何 hostname / IP 訪問都走 jt-ipam，不會看到 "Welcome to nginx"
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ipam.example.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP（明文，專用埠 8088）— 只服務 Graylog DSV 對照表
#   Graylog 的「DSV File from HTTP」轉接器若不便走 HTTPS（例如自簽憑證）可改抓這個埠。
#   注意：token 走 query string，明文 HTTP 會在線路上裸露 → 僅限信任內網使用。
#   不需要就把整個 server 區塊註解掉；換埠改 listen 即可（記得同步前端設定頁說明）。
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8088;
    listen [::]:8088;
    server_name _;

    # 只開放對照表端點，其餘一律 404
    location /api/v1/lookup/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }
    location / { return 404; }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — main site
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name ipam.example.com;

    # ── TLS（A04）──
    # 預設指向 /etc/jt-ipam/tls/server.{crt,key}
    # 自簽：scripts/generate-self-signed-cert.sh 自動產
    # 正式：把正式憑證 cp 到同位置後 systemctl reload nginx
    # 或：若改走 Let's Encrypt，把 ssl_certificate 指到 /etc/letsencrypt/live/{FQDN}/{fullchain,privkey}.pem
    ssl_certificate     /etc/jt-ipam/tls/server.crt;
    ssl_certificate_key /etc/jt-ipam/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers（A05）──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self'; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Frontend（Vite build 後的靜態檔）──
    root /opt/jt-ipam/frontend/dist;
    index index.html;
    expires $expires;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── 反代 API：套限流 ──
    location /api/phpipam/user/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    location /api/ {
        limit_req zone=api burst=80 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/jt-ipam-proxy.conf;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 阻擋常見隱私洩漏路徑 ──
    location ~ /\.(env|git|svn|hg|DS_Store) {
        deny all;
        access_log off;
        return 404;
    }

    # ── 限制請求大小（A04）──
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;
}
